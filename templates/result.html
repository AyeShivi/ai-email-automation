<!doctype html>
<html lang="en">
<head>
    <title>Email Prediction Results</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f5f7fc; }
        .result-card {
            margin: 48px auto;
            max-width: 900px;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,.1);
            padding: 34px;
        }
        th, td { padding: 10px; font-size: 1rem; vertical-align: middle; }
        th { background: #e7f1fa; }
        .btn-back { margin-top: 24px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="result-card">
            <h3 class="text-primary mb-4 text-center">Email Prediction Results</h3>
            <div class="table-responsive">
                {{ table|safe }}
            </div>
            <div class="text-center">
                <a href="/" class="btn btn-outline-primary btn-back">Go Back</a>
            </div>
        </div>
    </div>
</body>
</html>
